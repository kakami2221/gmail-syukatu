<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}就活 Gmail 整理{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">就活 Gmail 整理</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('main.dashboard') }}">ダッシュボード</a>
          <a class="nav-link" href="{{ url_for('main.emails') }}">メール一覧</a>
          <a class="nav-link" href="{{ url_for('main.companies') }}">企業一覧</a>
          <a class="nav-link" href="{{ url_for('main.sync') }}">再同期</a>
        </div>
      </div>
    </nav>
    <main class="container pb-5">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
